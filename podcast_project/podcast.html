
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播客知识库</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="channel-column" class="column">
            <header><h1>频道</h1></header>
            <ul id="channel-list"></ul>
        </div>
        <div id="program-column" class="column">
            <header><h1>节目</h1></header>
            <ul id="program-list"></ul>
        </div>
        <main id="details-column" class="column">
            <!-- Key points will be displayed here -->
            <div class="welcome-message">
                <h2>欢迎使用播客知识库</h2>
                <p>请从左侧选择一个频道，然后选择一个节目来查看其要点。</p>
            </div>
            <div id="key-points-display"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
