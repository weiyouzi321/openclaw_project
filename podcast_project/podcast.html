
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova's Projects - Podwise Knowledge Base</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside id="sidebar">
            <header>
                <h1>Podwise Episodes</h1>
                <p>A collection of 37 processed podcast episodes.</p>
            </header>
            <ul id="episode-list">
                <!-- Episode list will be populated by JavaScript -->
            </ul>
        </aside>
        <main id="content-area">
            <div class="welcome-message">
                <h2>Welcome</h2>
                <p>Select an episode from the list on the left to view its details.</p>
            </div>
            <div id="episode-details" class="hidden"> 
                <!-- Details will be populated by JavaScript -->
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
